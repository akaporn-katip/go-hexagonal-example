


services:
  postgres:
    image: postgres:15-alpine
    container_name: pg_migrate_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: myapp_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d myapp_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - otelnet

volumes:
  pgdata:

networks:
  otelnet: